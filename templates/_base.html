{% load static %}
{% load sass_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block title %}CivicEye{% endblock %}</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <!-- Favicon Icon -->
  <link rel="shortcut icon" href="{% static 'images/favicon.svg' %}" type="image/svg"/>
  <!-- All CSS files -->
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
  <link rel="stylesheet" href="{% static 'css/animate.css' %}" />
  <link rel="stylesheet" href="{% static 'css/lineicons.css' %}" />

  <link rel="stylesheet" href="{% sass_src 'scss/ud-styles.scss' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Header / Navigation -->
  {% include 'includes/header.html' %}

  <!-- Page Content -->
  {% block content %}
  {% endblock content %}

  <!-- Footer -->
  {% include 'includes/footer.html' %}

  <!-- Back To Top -->
  <a href="javascript:void(0)" class="back-to-top">
    <i class="lni lni-chevron-up"></i>
  </a>

  <!-- JavaScript Files -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  <script src="{% static 'js/wow.min.js' %}"></script>
  <script src="{% static 'js/main.js' %}"></script>
  <script>
    if (typeof WOW === 'function') {
        new WOW().init();
    }</script>
  {% block extra_js %}{% endblock %}
</body>
</html>
