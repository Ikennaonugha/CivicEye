{% load static %}
<!-- ====== Header Start ====== -->
<header class="ud-header">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <nav class="navbar navbar-expand-lg">
          <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'images/logo/logo.svg' %}" alt="CivicEye Logo" />
          </a>
          
          <!-- Accessible Navbar Toggler -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarCollapse"
            aria-controls="navbarCollapse"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="toggler-icon"> </span>
            <span class="toggler-icon"> </span>
            <span class="toggler-icon"> </span>
          </button>

          <!-- Collapsible Navigation Container -->
          <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul id="nav" class="navbar-nav mx-auto">
              <li class="nav-item">
                <a class="ud-menu-scroll" href="#home">Home</a>
              </li>
              <li class="nav-item">
                <a class="ud-menu-scroll" href="#dashboard">Dashboard</a>
              </li>
              <li class="nav-item">
                <a class="ud-menu-scroll" href="#about">About</a>
              </li>
              <li class="nav-item">
                <a class="ud-menu-scroll" href="#team">Team</a>
              </li>
            </ul>
          </div>

          <!-- Dynamic Authentication Logic -->
          <div class="navbar-btn d-none d-sm-inline-block">
            {% if user.is_authenticated %}
              <a href="{% url 'account_logout' %}" class="ud-main-btn ud-white-btn">
                Log Out
              </a>
            {% else %}
              <a href="{% url 'account_login' %}" class="ud-main-btn ud-login-btn">
                Log In
              </a>
              <a class="ud-main-btn ud-white-btn" href="{% url 'account_signup' %}">
                Sign Up
              </a>
            {% endif %}
          </div>
        </nav>
      </div>
    </div>
  </div>
</header>
<!-- ====== Header End ====== -->
