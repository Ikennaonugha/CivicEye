{% load static %}
<!-- ====== Footer Start ====== -->
<footer class="ud-footer wow fadeInUp" data-wow-delay=".15s">
  <div class="shape shape-1">
    <img src="{% static 'images/footer/shape-1.svg' %}" alt="shape" />
  </div>
  <div class="shape shape-2">
    <img src="{% static 'images/footer/shape-2.svg' %}" alt="shape" />

  </div>
  <div class="ud-footer-widgets">
    <div class="container">
      <div class="row">
        <div class="col-xl-3 col-lg-4 col-md-6">
          <div class="ud-widget">
            <a href="{% url 'home' %}" class="ud-footer-logo">
              <img src="{% static 'images/logo/logo.svg' %}" alt="CivicEye Logo" />

              Civic governance and public accountability platform.
            </p>
          </div>

            </ul>
          </div>

    </div>

  <div class="ud-footer-bottom">

      <div class="row">
        <div class="col-md-8">
          <ul class="ud-footer-bottom-left">
            <li><a href="javascript:void(0)">Privacy policy</a></li>
            <li><a href="javascript:void(0)">Terms of service</a></li>

        <div class="col-md-4">
          <p class="ud-footer-bottom-right">
            &copy; {% now "Y" %} CivicEye. All rights reserved.
          </p>
        </div>
      </div>
    </div>
  </div>
